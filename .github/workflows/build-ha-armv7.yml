name: Build Home Assistant armv7 (玩客云运行时优化)

on:
  workflow_dispatch:
    inputs:
      ha_version:
        description: 'Home Assistant 版本（例如 2026.7.2）'
        required: true
        default: '2026.7.2'
      integrations:
        description: '要包含的集成（空格分隔），留空则使用默认精简列表'
        required: false
        default: 'default_config androidtv_remote backup cast co2signal dlna_dmr dlna_dms duckdns forecast_solar hue ipp met mobile_app modbus nest onvif openuv radio_browser samsungtv shelly sun tuya upnp wiz zha'
      build_target:
        description: '构建目标：full（内置编译工具） 或 slim（不内置）'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - slim
      push_to_registry:
        description: '是否推送到 ghcr.io'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ha-armv7

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_to_registry }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build args
        id: prep
        run: |
          HA_VERSION="${{ inputs.ha_version }}"
          INTEGRATIONS="${{ inputs.integrations }}"
          if [ -z "$INTEGRATIONS" ]; then
            INTEGRATIONS="default_config androidtv_remote backup cast co2signal dlna_dmr dlna_dms duckdns forecast_solar hue ipp met mobile_app modbus nest onvif openuv radio_browser samsungtv shelly sun tuya upnp wiz zha"
          fi
          echo "HA_VERSION=$HA_VERSION" >> $GITHUB_OUTPUT
          echo "INTEGRATIONS=$INTEGRATIONS" >> $GITHUB_OUTPUT
          echo "BUILD_TARGET=${{ inputs.build_target }}" >> $GITHUB_OUTPUT
          IMAGE_TAG=$(echo "${HA_VERSION}-armv7" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          push: ${{ inputs.push_to_registry }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            HA_VERSION=${{ steps.prep.outputs.HA_VERSION }}
            INTEGRATIONS=${{ steps.prep.outputs.INTEGRATIONS }}
            BUILD_TARGET=${{ steps.prep.outputs.BUILD_TARGET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
