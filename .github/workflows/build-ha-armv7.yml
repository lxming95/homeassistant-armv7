name: Build HA ARMv7 Image
on:
  # 手动触发
  workflow_dispatch:
    inputs:
      ha_ver:
        description: Home Assistant Version
        default: "2026.7.1"
        type: choice
        options:
          - 2026.7.1
          - 2026.7.2
      build_target:
        description: Build Target runtime/full
        default: "runtime"
        type: choice
        options:
          - runtime
          - full
  # 推送代码自动构建
  push:
    branches: [ main ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 初始化QEMU多架构模拟器，支持arm/v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 初始化buildx构建器
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录GHCR（关键密钥配置）
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 定义镜像变量
      - name: Set Env
        run: |
          echo "HA_VERSION=${{ github.event.inputs.ha_ver || '2026.7.1' }}" >> $GITHUB_ENV
          echo "BUILD_TARGET=${{ github.event.inputs.build_target || 'runtime' }}" >> $GITHUB_ENV
          echo "IMAGE_NAME=homeassistant-armv7-lean" >> $GITHUB_ENV
          echo "GHCR_REPO=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME" >> $GITHUB_ENV

      # 云端交叉编译镜像（等价本地 ./build.sh）
      - name: Build & Push ARMv7 Image
        env:
          PYTHON_BUILD_JOBS: 1
        run: |
          docker buildx build \
            --platform linux/arm/v7 \
            --build-arg HA_VERSION=${{ env.HA_VERSION }} \
            --build-arg PYTHON_VERSION=3.14.2 \
            --build-arg BUILD_TARGET=${{ env.BUILD_TARGET }} \
            -t ${{ env.GHCR_REPO }}:${{ env.HA_VERSION }} \
            -t ${{ env.GHCR_REPO }}:latest \
            --push .

      # 输出镜像地址
      - name: Output Image URL
        run: echo "镜像地址：${{ env.GHCR_REPO }}:${{ env.HA_VERSION }}"
